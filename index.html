<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- SEO -->
    <title>Periodic Table HTML Example</title>
    <meta name="description" content="Simple periodic table (Mendeleev table) created using HTML.">

</head>
<body>

    <h1>Periodic Table of Elements</h1>
    <p>This is a simple Mendeleev periodic table created using HTML.</p>

    <table border="1" style="border-collapse: collapse;">
        <caption>Mendeleev Table</caption>
        <thead>
            <tr>
                <th>1</th>
                <th>2</th>
                <th>3</th>
                <th>4</th>
                <th>5</th>
                <th>6</th>
                <th>7</th>
                <th>8</th>
                <th>9</th>
                <th>10</th>
                <th>11</th>
                <th>12</th>
                <th>13</th>
                <th>14</th>
                <th>15</th>
                <th>16</th>
                <th>17</th>
                <th>18</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td bgcolor="salmon">1 <br> H</td>
                <td colspan="16"></td>
                <td>2 <br> He</td>
            </tr>
            <tr>
                <td>3 <br> Li</td>
                <td>4 <br> Be</td>
                <td colspan="10"></td>
                <td>5 <br> B</td>
            </tr>
        </tbody>
    </table>

</body>
</html>
